# Help Center sections
helpCenterQuickStart: Quick Start
helpCenterQuickStartDesc: From connecting to viewing data in a few steps.
helpCenterQuickStartSteps: |-
  In Transport on the left, choose Serial/CAN/UDP/TCP or Test Data, configure parameters, and click Connect
  In Protocol Engine, select the matching protocol (e.g. JustFloat / FireWater / CAN / LogicDecode)
  Drag widgets from the Widget Palette onto the canvas and connect them to channel sources or upstream widgets
  The bottom Data area shows Waveform, Raw Data, CAN Frames, Logic Analyzer, etc.
  Click the help icon at the bottom-left to reopen this Help Center
helpTransport: Transport
helpTransportDesc: Configure the physical connection between the device and the app.
helpTransportSteps: |-
  Serial: choose port, baud rate, data/parity/stop bits, then click Connect
  CAN: choose Slcan (serial-to-CAN) or CandleLight (native USB) and set bitrate
  Network: UDP or TCP client/server, fill local/remote address and port
  Test Data: no hardware needed; use the built-in signal generator to verify waveforms and widgets
helpProtocol: Protocol Engine
helpProtocolDesc: Parse raw byte streams into channel data, CAN frames, or logic samples.
helpProtocolSteps: |-
  JustFloat / FireWater: generic float protocols; auto-detect or manually set channel count
  RawData: no parsing, display raw bytes directly
  Slcan / CandleLight: CAN protocols, parsed into CAN frames and shown in the CAN tab
  LogicDecode: logic-analyzer protocol, captures digital channels and supports protocol decoding
helpWidgets: Widgets & Node Editor
helpWidgetsDesc: Build data flows by dragging and connecting nodes.
helpWidgetsSteps: |-
  Drag widgets (Knob, Button, Gauge, Waveform, etc.) from the Widget Palette onto the canvas
  Each widget is a node; connect inputs/outputs to channel sources or other widgets
  Double-click or right-click a widget to edit parameters, labels, and bindings
  Input widgets like Knob/Slider/Button can send data to the device
  Display widgets like Waveform/PieChart/Spectrum automatically create bottom data tabs
helpCan: CAN Frame Analysis
helpCanDesc: Receive, filter, send, and analyze CAN bus data.
helpCanSteps: |-
  Protocol Engine must be set to Slcan or CandleLight with hardware connected
  Click the bottom "+" to add a CAN Frame tab, or open it from the menu
  View real-time CAN frames in Frame List; filter by ID / direction, select, copy, export CSV
  Use CAN Sender to construct and transmit frames manually
  Use Bus Activity to see RX/TX statistics per ID
helpLogic: Logic Analyzer
helpLogicDesc: Capture multi-channel digital signals and view timing plus decoded events.
helpLogicSteps: |-
  Protocol Engine must be set to LogicDecode
  Click the bottom "+" to add a Logic Analyzer tab
  Timing Diagram shows digital waveforms per channel, with zoom and auto-scroll
  Decoded Events lists protocol decode results and supports export
  Sample rate and channel count are determined by the backend based on hardware config
helpCustom: Custom Widgets
helpCustomDesc: Create dedicated display or interaction widgets with JavaScript.
helpCustomSteps: |-
  Add a Custom widget from the palette and open the editor
  Return an object containing name / inputs / outputs / settings / render
  The render function reads ctx.inputs / ctx.settings and manipulates ctx.el
  Use ctx.send to emit values to downstream output ports
  Custom scripts run in an iframe sandbox with security restrictions; a performance warning is shown on first use

