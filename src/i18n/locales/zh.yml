# 高亮引导
tourStep: 步骤
tourNext: 下一步
tourPrev: 上一步
tourSkip: 跳过
tourFinish: 完成
tourWelcomeTitle: 欢迎使用 Vofa Next
tourWelcomeContent: 本引导将带你快速熟悉核心操作。高亮区域是当前要介绍的功能，点击“下一步”继续；随时可点击右上角跳过。
tourTransportTitle: 数据接口
tourTransportContent: 从这里选择串口、CAN、UDP/TCP 或测试数据，并配置端口、波特率等参数。配置好后点击“连接”。
tourProtocolTitle: 协议引擎
tourProtocolContent: 根据设备选择解析协议：JustFloat / FireWater 用于通用波形，Slcan / CandleLight 用于 CAN 总线，LogicDecode 用于逻辑分析仪，RawData 仅显示原始字节。
tourWidgetsTitle: 控件面板
tourWidgetsContent: 拖拽旋钮、按钮、波形图、仪表盘等控件到上方画布，构建你的交互界面。控件之间可以连线传递数据。
tourConnectTitle: 连接设备
tourConnectContent: 参数配置完成后，点击这里的“连接”按钮开始接收数据。连接状态会在底部状态栏显示。
tourDataTitle: 数据显示区
tourDataContent: 底部会显示波形、原始数据、CAN 帧、逻辑分析仪等 Tab。点击右侧的 CPU / 电路板图标可新增 CAN 或逻辑分析仪页面。
tourHelpTitle: 帮助中心
tourHelpContent: 任何时候点击左下角的帮助图标，都可以重新打开帮助中心或本引导。你也能在设置中关闭使用引导。

# 帮助中心章节
helpCenterQuickStart: 快速入门
helpCenterQuickStartDesc: 从连接到查看数据，只需几个步骤。
helpCenterQuickStartSteps: |-
  在左侧“数据接口”选择串口/CAN/UDP/TCP 或测试数据，配置参数后点击连接
  在“协议引擎”选择与设备匹配的协议（如 JustFloat / FireWater / CAN / LogicDecode）
  在“控件面板”拖拽控件到画布，自动从通道源或上游控件连线
  底部“数据”区会显示波形、原始数据、CAN 帧、逻辑分析仪等 Tab
  点击左下角帮助图标可随时查看本帮助中心
helpTransport: 数据接口
helpTransportDesc: 配置设备与上位机之间的物理连接。
helpTransportSteps: |-
  串口：选择端口、波特率、数据位/校验/停止位，点击“连接”
  CAN：选择 Slcan（串口转 CAN）或 CandleLight（原生 USB），配置波特率
  网络：UDP 或 TCP 客户端/服务端，填写本地/远端地址与端口
  测试数据：不连接硬件，使用内置信号发生器验证波形与控件
helpProtocol: 协议引擎
helpProtocolDesc: 将原始字节流解析为通道数据、CAN 帧或逻辑采样。
helpProtocolSteps: |-
  JustFloat / FireWater：通用浮点协议，可自动检测或手动指定通道数
  RawData：不做解析，直接显示原始字节流
  Slcan / CandleLight：CAN 协议，解析为 CAN 帧并在 CAN Tab 显示
  LogicDecode：逻辑分析仪协议，采集数字通道并支持协议解码
helpWidgets: 控件与节点编辑器
helpWidgetsDesc: 通过拖拽和连线构建数据流。
helpWidgetsSteps: |-
  从左侧“控件面板”拖拽控件（旋钮、按钮、仪表盘、波形图等）到上方画布
  每个控件即一个节点，可连接“通道源”或其他控件的输入/输出
  双击或右键控件可修改参数、标签、绑定关系
  使用 Knob/Slider/Button 等输入控件可向设备发送数据
  Waveform/PieChart/Spectrum 等显示控件会自动创建底部数据 Tab
helpCan: CAN 帧分析
helpCanDesc: 接收、过滤、发送和分析 CAN 总线数据。
helpCanSteps: |-
  协议引擎需设置为 Slcan 或 CandleLight 并连接硬件
  点击底部“+”添加 CAN 帧 Tab，或在顶部菜单打开
  在“帧列表”查看实时 CAN 帧，支持按 ID / 方向过滤、选中复制、导出 CSV
  在“CAN 发送器”手动构造帧并发送
  在“总线活动”查看各 ID 的收发统计
helpLogic: 逻辑分析仪
helpLogicDesc: 采集多路数字信号并查看时序与解码事件。
helpLogicSteps: |-
  协议引擎需设置为 LogicDecode
  点击底部“+”添加逻辑分析仪 Tab
  “时序图”显示各通道数字波形，可缩放与自动滚动
  “解码事件”列出协议解码结果，支持导出
  采样率与通道数由后端根据硬件配置决定
helpCustom: 自定义控件
helpCustomDesc: 使用 JavaScript 创建专属显示或交互控件。
helpCustomSteps: |-
  在控件面板添加 Custom 控件，打开编辑器
  返回包含 name / inputs / outputs / settings / render 的对象
  render 函数通过 ctx.inputs / ctx.settings 读取数据并操作 ctx.el
  使用 ctx.send 向下游输出端口发送值
  自定义脚本在 iframe 沙箱中运行，受安全限制，首次使用会显示性能警告

