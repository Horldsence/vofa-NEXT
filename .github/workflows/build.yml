name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 0.1.2-beta.1)，留空则使用仓库中的版本'
        required: false
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  RUST_TOOLCHAIN: stable

jobs:
  build:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: '--target universal-apple-darwin'
            artifact-name: macos
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
            artifact-name: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            artifact-name: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version
        if: inputs.version != ''
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          # MSI 版本号不支持 pre-release 标识符，剥离 -beta.x 等后缀
          BUNDLE_VERSION="${VERSION%%-*}"
          sed -i.bak 's/"version": "[^"]*"/"version": "'"$BUNDLE_VERSION"'"/' src-tauri/tauri.conf.json
          sed -i.bak 's/^version = "[^"]*"/version = "'"$BUNDLE_VERSION"'"/' src-tauri/Cargo.toml
          sed -i.bak 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' package.json
          rm -f src-tauri/tauri.conf.json.bak src-tauri/Cargo.toml.bak package.json.bak
          echo "bundle version: $BUNDLE_VERSION"
          echo "npm version: $VERSION"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev pkg-config

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.artifact-name }}
          path: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.sig
          retention-days: 30
          if-no-files-found: error
