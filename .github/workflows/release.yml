name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 0.1.2-beta.1)，需与构建时填写的版本一致'
        required: true
        type: string
      build_run_id:
        description: 'Build workflow run ID (留空则自动使用最近一次成功的构建)'
        required: false
        type: string
      prerelease:
        description: '标记为 pre-release'
        required: true
        type: boolean
        default: true
      draft:
        description: '保存为 draft (不公开发布)'
        required: true
        type: boolean
        default: false

jobs:
  release:
    name: Create Release
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build run ID
        id: resolve-run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.build_run_id }}" ]; then
            RUN_ID="${{ inputs.build_run_id }}"
            echo "使用手动指定的 Build run ID: $RUN_ID"
          else
            echo "未指定 build_run_id，查找最近一次成功的构建..."
            RUN_ID=$(gh run list \
              --workflow=build.yml \
              --status=success \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "::error::未找到成功的 Build workflow run。请先手动触发 Build 工作流，或手动指定 build_run_id。"
              exit 1
            fi
            echo "自动找到 Build run ID: $RUN_ID"
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.resolve-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: |
          echo "=== 下载的构件 ==="
          find artifacts -type f | sort

      - name: Collect release assets
        id: assets
        shell: bash
        run: |
          mapfile -t FILES < <(find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.sig" \
          \) | sort)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::未在构件中找到任何安装包文件"
            exit 1
          fi
          echo "找到 ${#FILES[@]} 个发布文件："
          printf '  %s\n' "${FILES[@]}"
          printf '%s\n' "${FILES[@]}" > /tmp/release-assets.txt
          echo "count=${#FILES[@]}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"

          PRERELEASE_LABEL="${{ inputs.prerelease == true && 'pre-release' || '正式 release' }}"
          cat > /tmp/release-notes.md <<NOTES
          ## v${{ inputs.version }}

          本次为 ${PRERELEASE_LABEL}。

          ### 安装包
          - macOS: \`.dmg\` (universal)
          - Linux: \`.deb\` / \`.AppImage\`
          - Windows: \`.msi\` / \`.exe\` (NSIS)

          > 共包含 ${{ steps.assets.outputs.count }} 个文件，来自 Build #${{ steps.resolve-run.outputs.run_id }}
          NOTES

          ARGS=(--title "$TAG" --notes-file /tmp/release-notes.md --target main)
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          if [ "${{ inputs.draft }}" = "true" ]; then
            ARGS+=(--draft)
          fi

          mapfile -t FILES < /tmp/release-assets.txt
          gh release create "$TAG" "${FILES[@]}" "${ARGS[@]}"
          echo "✅ Release $TAG 创建成功"
