name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 0.1.0-beta.1)'
        required: true
        type: string
      prerelease:
        description: '标记为 pre-release'
        required: true
        type: boolean
        default: true
      draft:
        description: '保存为 draft (不公开发布)'
        required: true
        type: boolean
        default: false

env:
  RUST_TOOLCHAIN: stable

jobs:
  build:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bin_name: vofa-next-app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin_name: vofa-next-app
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: vofa-next-app.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          # Cargo 包版本不支持 pre-release 标识符，剥离 `-beta.x` 等后缀
          PACKAGE_VERSION="${VERSION%%-*}"
          sed -i.bak 's/^version = "[^"]*"/version = "'"$PACKAGE_VERSION"'"/' Cargo.toml
          sed -i.bak 's/^version = "[^"]*"/version = "'"$PACKAGE_VERSION"'"/' app/Cargo.toml
          rm -f Cargo.toml.bak app/Cargo.toml.bak
          echo "package version: $PACKAGE_VERSION"
          echo "release tag: v$VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libudev-dev pkg-config

      - name: Build
        run: cargo build --release -p vofa-next-app --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/vofa-next-${{ inputs.version }}-${{ matrix.target }}${{ matrix.platform == 'windows-latest' && '.exe' || '' }}"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            7z a "dist/vofa-next-${{ inputs.version }}-${{ matrix.target }}.zip" "dist/vofa-next-${{ inputs.version }}-${{ matrix.target }}.exe"
          else
            tar -czf "dist/vofa-next-${{ inputs.version }}-${{ matrix.target }}.tar.gz" -C dist "vofa-next-${{ inputs.version }}-${{ matrix.target }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vofa-next-${{ matrix.target }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          body: |
            ## v${{ inputs.version }}

            本次为 ${{ inputs.prerelease && 'pre-release' || '正式 release' }}。

            ### 平台
            - macOS (Apple Silicon): `.tar.gz`
            - Linux (x86_64): `.tar.gz`
            - Windows (x86_64): `.zip`
          files: dist/*
